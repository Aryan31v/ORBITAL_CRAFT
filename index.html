<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITAL CRAFT | Visual Storytelling & Code</title>
    <meta name="description" content="A character-centric portfolio exploring the intersection of design and physics-based motion.">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Syne:wght@400..800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" href="src/shared/styles/variables.css">
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/features/hero/hero.css">
    <link rel="stylesheet" href="src/features/tools/tools.css">
    <link rel="stylesheet" href="src/features/entrance/portal.css">
    <link rel="stylesheet" href="src/features/navigation/explore.css">
    
    <!-- Smooth Scroll: Lenis (Premimum momentum) -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.9/dist/lenis.css">
    
    <!-- Motion & Typography Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
</head>
<body>
    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>

    <header class="nav">
        <div class="container nav__container">

            <div class="nav__links">
                <a href="#contact" class="nav__link nav__link--btn">Get in touch</a>
            </div>
        </div>
    </header>

    <main id="app">
        <section id="portal-mount"></section>
        <div id="content-shell" style="opacity: 0;">
            <section id="hero-mount"></section>
            <section id="tools-mount"></section>
        </div>
        <section id="explore-mount"></section>
    </main>

    <script type="module">
        import { initScroll } from './src/shared/utils/scrollManager.js';
        import { initPortal } from './src/features/entrance/EntrancePortal.js';
        import { initHero } from './src/features/hero/HeroSection.js';
        import { initTools } from './src/features/tools/ToolsSection.js';
        import { initExplore } from './src/features/navigation/ExploreNav.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            // Global Scroll System (Initial setup)
            initScroll();

            // Navigation is immediately available but menu is hidden
            initExplore(document.getElementById('explore-mount'));
            
            // Initialization of the Portal
            initPortal(document.getElementById('portal-mount'), () => {
                const contentShell = document.getElementById('content-shell');
                
                // 1. Fade in the content shell elegantly
                gsap.to(contentShell, {
                    opacity: 1,
                    duration: 1,
                    ease: 'power2.out',
                    onStart: () => {
                        // 2. Initialize feature animations as it fades in
                        initHero(document.getElementById('hero-mount'));
                        initTools(document.getElementById('tools-mount'));
                    },
                    onComplete: () => {
                        // 3. Force ScrollTrigger to perfectly recalculate everything
                        ScrollTrigger.refresh();
                    }
                });
            });
        });
    </script>
</body>
</html>
